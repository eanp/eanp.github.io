<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Quran Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .quran-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background-color: #f5f5f5;
        }

        .quran-page {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            user-select: none;
            transition: transform 0.3s ease;
        }

        .page-number {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.7);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 16px;
        }

        .navigation-buttons {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }

        .nav-button {
            background-color: rgba(255, 255, 255, 0.7);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="quran-container" id="quranContainer">
        <img src="../static/1.png" alt="Quran Page" class="quran-page" id="quranPage">
        <div class="page-number" id="pageNumber">Page 1 / 604</div>
        <div class="navigation-buttons">
            <button class="nav-button" id="prevButton">Previous</button>
            <button class="nav-button" id="nextButton">Next</button>
        </div>
    </div>

    <script>
        // Page handling variables
        let currentPage = 1;
        const totalPages = 604;
        const quranPage = document.getElementById('quranPage');
        const pageNumber = document.getElementById('pageNumber');
        const prevButton = document.getElementById('prevButton');
        const nextButton = document.getElementById('nextButton');
        const container = document.getElementById('quranContainer');

        // Touch variables for swipe
        let touchStartX = 0;
        let touchEndX = 0;
        const swipeThreshold = 50;

        // Function to update the displayed page
        function updatePage() {
            quranPage.src = `/static/${currentPage}.png`;
            pageNumber.textContent = `Page ${currentPage} / ${totalPages}`;

            // Save current page to localStorage
            localStorage.setItem('quranCurrentPage', currentPage);

            // Disable buttons at boundaries
            prevButton.disabled = currentPage <= 1;
            nextButton.disabled = currentPage >= totalPages;
        }

        // Function to go to previous page
        function goToPreviousPage() {
            if (currentPage > 1) {
                currentPage--;
                updatePage();
            }
        }

        // Function to go to next page
        function goToNextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                updatePage();
            }
        }

        // Touch event handlers for swipe
        function handleTouchStart(e) {
            touchStartX = e.touches[0].clientX;
        }

        function handleTouchMove(e) {
            touchEndX = e.touches[0].clientX;

            // Calculate swipe distance
            const swipeDistance = touchEndX - touchStartX;

            // Apply a live transform to give visual feedback
            if (Math.abs(swipeDistance) > 20) {
                quranPage.style.transform = `translateX(${swipeDistance / 5}px)`;
            }
        }

        function handleTouchEnd() {
            // Calculate final swipe distance
            const swipeDistance = touchEndX - touchStartX;

            // Reset transform
            quranPage.style.transform = '';

            // If swipe distance exceeds threshold, change page
            if (Math.abs(swipeDistance) > swipeThreshold) {
                if (swipeDistance > 0) {
                    // Swiped right, go to previous page
                    goToPreviousPage();
                } else {
                    // Swiped left, go to next page
                    goToNextPage();
                }
            }

            // Reset touch positions
            touchStartX = 0;
            touchEndX = 0;
        }

        // Event listeners
        prevButton.addEventListener('click', goToPreviousPage);
        nextButton.addEventListener('click', goToNextPage);

        // Touch events for swipe
        container.addEventListener('touchstart', handleTouchStart);
        container.addEventListener('touchmove', handleTouchMove);
        container.addEventListener('touchend', handleTouchEnd);

        // Check for saved page in localStorage
        window.addEventListener('DOMContentLoaded', () => {
            const savedPage = localStorage.getItem('quranCurrentPage');
            if (savedPage) {
                currentPage = parseInt(savedPage);
                updatePage();
            }
        });
    </script>
</body>
</html>
